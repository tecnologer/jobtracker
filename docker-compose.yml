services:
  backend:
    image: golang:latest
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - go-mod:/go/pkg/mod
      - go-bin:/go/bin
    environment:
      DB_PATH: /app/jobs.db
    ports:
      - "8080:8080"
    command: >
      sh -c "[ -f /go/bin/air ] || go install github.com/air-verse/air@latest && air"

  frontend:
    image: node:20-alpine
    working_dir: /web
    volumes:
      - ./web:/web
      - node-modules:/web/node_modules
    ports:
      - "5173:5173"
    environment:
      API_URL: http://backend:8080
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  go-mod:
  go-bin:
  node-modules:
