services:
  backend:
    image: golang:1.26
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    working_dir: /app
    volumes:
      - .:/app
      - go-mod:/go/pkg/mod
      - go-bin:/go/bin
    environment:
      DB_PATH: /app/jobs.db
      # No default credentials here: copy .env.example to .env and set real
      # values. `:?` makes compose fail fast with this message instead of
      # baking dev credentials into a file that also gets used as a template
      # for production.
      AUTH_EMAIL: ${AUTH_EMAIL:?set it in .env (copy .env.example)}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set it in .env (copy .env.example)}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      # First run installs air and downloads modules before the server is up.
      start_period: 180s
    command: >
      sh -c "[ -f /go/bin/air ] || go install github.com/air-verse/air@latest && air"

  frontend:
    image: node:22-alpine
    init: true
    security_opt:
      - no-new-privileges:true
    working_dir: /web
    volumes:
      - ./web:/web
      - node-modules:/web/node_modules
    ports:
      - "5173:5173"
    environment:
      API_URL: http://backend:8080
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  go-mod:
  go-bin:
  node-modules:
