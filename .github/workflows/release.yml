name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: jobtracker-desktop-linux-amd64
            tags: desktop,production,webkit2_41
            ldflags: -s
          - os: windows-latest
            artifact: jobtracker-desktop-windows-amd64.exe
            tags: desktop,production
            ldflags: -s -H windowsgui
          - os: macos-latest
            artifact: jobtracker-desktop-darwin-arm64
            tags: desktop,production
            ldflags: -s
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - run: go build -tags ${{ matrix.tags }} -ldflags "${{ matrix.ldflags }}" -o ${{ matrix.artifact }} ./cmd/desktop

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
